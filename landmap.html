<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地形分類図 Webマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100%; }
        /* 透過度スライダーのUIスタイル */
        .opacity-control {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font-family: sans-serif;
            font-size: 14px;
        }
        /* ラベルのスタイル */
        .leaflet-label {
            background: none;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 12px;
            /* 文字に白のアウトラインを付けて、背景地図と重なっても見やすくする */
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 地理院タイルの設定
    const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル（標準地図）</a>",
        maxZoom: 18
    });

    const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル（航空写真）</a>",
        maxZoom: 18
    });

    const relief = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/relief/{z}/{x}/{y}.png', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル（色別標高図）</a>",
        maxZoom: 15
    });

    const shadow = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/anaglyph/{z}/{x}/{y}.png', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル（赤色立体図）</a>",
        maxZoom: 15
    });

    // 2. マップの初期化
    const map = L.map('map', {
        center: [35.3606, 138.7274], // 例: 富士山付近
        zoom: 12,
        layers: [std] // 初期表示の背景地図
    });

    // 出典の追加
    map.attributionControl.addAttribution("国土数値情報の20万分の１土地分類基本調査を加工して作成しています");

    // 3. 背景地図の切り替えコントロールを追加
    const baseMaps = {
        "標準地図": std,
        "航空写真": photo,
        "色別標高図": relief,
        "赤色立体図": shadow
    };
    const layerControl = L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

    // 4. 地形分類図の設定
    // 色分けのためのカラーマップ（属性2の名称と対応する色）
    const terrainColors = {
        '山地': '#A52A2A',    // 茶色
        '台地': '#FFA500',    // オレンジ
        '低地': '#008000',    // 緑
        '扇状地': '#D2B48C',  // 黄土色
        '自然堤防': '#FFFFE0', // 黄
        '旧河道': '#00BFFF',   // 青
        '水部': '#000080'      // 濃青
    };

    // GeoJSONレイヤ
    let geojsonLayer;

    // カスタム透過度コントロールの作成
    const OpacityControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function (map) {
            const div = L.DomUtil.create('div', 'opacity-control leaflet-bar');
            div.innerHTML = `
                <label for="opacitySlider">地形分類図の透過度: </label><br>
                <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.6" style="width:100%;">
            `;
            // マップのドラッグ操作などがスライダーに干渉しないようにする
            L.DomEvent.disableClickPropagation(div);
            return div;
        }
    });
    map.addControl(new OpacityControl());

    // GeoJSONデータの取得
    fetch('data/land.geojson')
        .then(response => response.json())
        .then(data => {
            geojsonLayer = L.geoJSON(data, {
                style: function (feature) {
                    const category = feature.properties.属性2;
                    return {
                        color: terrainColors[category] || '#CCCCCC', // 分類ごとの色、なければグレー
                        weight: 1,        // 枠線の太さ
                        fillColor: terrainColors[category] || '#CCCCCC', // 分塗りつぶしの色、なければグレー
                        fillOpacity: document.getElementById('opacitySlider').value
                    };
                },
                onEachFeature: function (feature, layer) {
                    // ラベルの作成（属性2の名称をポリゴンの中心に表示）
                    if (feature.properties && feature.properties.属性2) {
                        layer.bindLabel(feature.properties.属性2, {
                            noHide: true,     // 常に表示
                            direction: 'auto', // 自動的に最適な位置に表示
                            className: 'leaflet-label' // CSSクラスを指定
                        });
                    }
                    // ポップアップ表示（属性テーブルの内容）
                    if (feature.properties) {
                        let popupContent = "<table border='1' style='border-collapse: collapse;'>";
                        for (let key in feature.properties) {
                            popupContent += `<tr><th style='padding:3px;'>${key}</th><td style='padding:3px;'>${feature.properties[key]}</td></tr>`;
                        }
                        popupContent += "</table>";
                        layer.bindPopup(popupContent);
                    }
                }
            }).addTo(map);

            layerControl.addOverlay(geojsonLayer, "地形分類図");

            // マップの表示範囲をGeoJSONの範囲に自動調整
            map.fitBounds(geojsonLayer.getBounds());

            // スライダーを動かしたときの透過度変更イベント
            document.getElementById('opacitySlider').addEventListener('input', function (e) {
                if (geojsonLayer) {
                    geojsonLayer.setStyle({ fillOpacity: e.target.value });
                }
            });
        })
        .catch(error => console.error('GeoJSONの読み込みエラー:', error));

</script>
</body>
</html>
